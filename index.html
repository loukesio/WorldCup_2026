// ASCII-fold so Türkiye/Turkiye, Curaçao/Curacao all match
const _COMBINING = new RegExp("[\\u0300-\\u036f]", "g");
const _norm = (s) => (s||"").normalize("NFD").replace(_COMBINING,"").trim().toLowerCase();
const FIXTURE_BY_PAIR = (()=>{
  const m = {};
  FIXTURES.forEach(f => { m[_norm(f.home)+"|"+_norm(f.away)] = { id:f.id, swap:false }; });
  FIXTURES.forEach(f => {                          // fallback: reversed home/away in feed
    const k = _norm(f.away)+"|"+_norm(f.home);
    if (!(k in m)) m[k] = { id:f.id, swap:true };
  });
  return m;
})();
// minimal quote-aware CSV reader for data/results.csv (header + 4 cols)
function parseResultsCSV(text){
  if(!text) return [];
  const lines = text.replace(/\r/g,"").split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const out = [];
  for (let i=1; i<lines.length; i++){
    const cells = []; let cur="", inQ=false;
    for (let j=0; j<lines[i].length; j++){
      const c = lines[i][j];
      if (c === '"'){ inQ = !inQ; continue; }
      if (c === ',' && !inQ){ cells.push(cur); cur=""; continue; }
      cur += c;
    }
    cells.push(cur);
    if (cells.length >= 4) out.push(cells);
  }
  return out;
}
function feedFromCSV(text){
  const feed = {};
  for (const r of parseResultsCSV(text)){
    const hs = parseInt(r[2],10), as = parseInt(r[3],10);
    if (Number.isNaN(hs) || Number.isNaN(as)) continue;
    const hit = FIXTURE_BY_PAIR[_norm(r[0])+"|"+_norm(r[1])];
    if (!hit){ console.warn("results.csv: no fixture for", r[0], "vs", r[1]); continue; }
    feed[hit.id] = hit.swap ? { ga: as, gb: hs } : { ga: hs, gb: as };
  }
  return feed;
}

];
const THIRD_SLOTS = [

];
// Custom bracket tree (top seeds spread across quarters, honouring the
// "top-4 separated until the semis" design). Indices reference prior round.
const R16_PAIRS = [[10,0],[3,9],[5,4],[1,6],[14,13],[2,11],[7,12],[8,15]];
const QF_PAIRS  = [[0,1],[2,3],[4,5],[6,7]];
const SF_PAIRS  = [[0,1],[2,3]];

/* ----------------------------- ENGINE --------------------------------- */
function poisson(l){ const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }

function lambdas(eloA, eloB, hostA, hostB, ko){
  const bump = ko ? 30 : 55;
  let Rd = eloA - eloB + (hostA?bump:0) - (hostB?bump:0);
  const sup = Rd / 250;
  const lamA = Math.max(0.18, 1.38 + sup/2);
  const lamB = Math.max(0.18, 1.38 - sup/2);
  return [lamA, lamB, Rd];
}
// returns {ga,gb,win:'A'|'B'|'D'}
function simMatch(a, b, elo, ko){
  const [lamA, lamB, Rd] = lambdas(elo[a], elo[b], HOSTS.has(a), HOSTS.has(b), ko);
  let ga = poisson(lamA), gb = poisson(lamB);
  if (ga === gb && ko){
    const pA = 1/(1+Math.pow(10, -Rd/400));
    return { ga, gb, win: Math.random() < pA ? "A" : "B" };
  }
  return { ga, gb, win: ga>gb ? "A" : gb>ga ? "B" : "D" };
}
// analytic W/D/L for schedule display
function wdl(a, b){
  const [lamA, lamB] = lambdas(TEAMS[a].elo, TEAMS[b].elo, HOSTS.has(a), HOSTS.has(b), false);
  const pmf = (l,k)=>Math.exp(-l)*Math.pow(l,k)/factorial(k);
  let w=0,d=0,los=0;
  for(let i=0;i<=9;i++) for(let j=0;j<=9;j++){
    const p = pmf(lamA,i)*pmf(lamB,j);
    if(i>j) w+=p; else if(i===j) d+=p; else los+=p;
  }
  const s=w+d+los; return { w:w/s, d:d/s, l:los/s };
}
const _fact=[1]; function factorial(n){ if(_fact[n]!=null)return _fact[n]; let r=_fact[_fact.length-1],i=_fact.length; for(;i<=n;i++){r*=i;_fact[i]=r;} return _fact[n]; }

// Elo update from locked results (sequential, chronological)
function buildCurrentElo(locked){
  const elo = {}; TEAM_NAMES.forEach(t=>elo[t]=TEAMS[t].elo);
  const entries = Object.entries(locked).map(([id,v])=>({ ...FIXTURES[+id], ...v }));
  entries.sort((x,y)=>DATE_ORDER.indexOf(x.date)-DATE_ORDER.indexOf(y.date));
  for(const m of entries){
    const Rd = elo[m.home]-elo[m.away];
    const E = 1/(1+Math.pow(10,-Rd/400));
    const S = m.ga>m.gb?1:m.ga<m.gb?0:0.5;
    const gd = Math.abs(m.ga-m.gb);
    const gMul = gd<=1?1 : gd===2?1.5 : (11+gd)/8;
    const K = 40;
    const delta = K*gMul*(S-E);
    elo[m.home]+=delta; elo[m.away]-=delta;
  }
  return elo;
}

// perfect matching of best thirds → third slots (backtracking)
function assignThirds(groups){
  const used = new Array(THIRD_SLOTS.length).fill(false);
  const out = {};
  const bt = (i)=>{
    if(i>=groups.length) return true;
    const g = groups[i];
    for(let s=0;s<THIRD_SLOTS.length;s++){
      if(!used[s] && THIRD_SLOTS[s].el.has(g)){
        used[s]=true; out[THIRD_SLOTS[s].idx]=g;
        if(bt(i+1)) return true;
        used[s]=false; delete out[THIRD_SLOTS[s].idx];
      }
    }
    return false;
  };
  if(bt(0)) return out;
  // fallback (rare)
  const u=new Array(THIRD_SLOTS.length).fill(false), fb={};
  groups.forEach(g=>{ let done=false;
    for(let s=0;s<THIRD_SLOTS.length;s++){ if(!u[s]&&THIRD_SLOTS[s].el.has(g)){u[s]=true;fb[THIRD_SLOTS[s].idx]=g;done=true;break;} }
    if(!done) for(let s=0;s<THIRD_SLOTS.length;s++){ if(!u[s]){u[s]=true;fb[THIRD_SLOTS[s].idx]=g;break;} }
  });
  return fb;
}

// one full tournament
function simTournament(elo, locked, acc){
  // ----- group stage -----
  const standings = {}; // group -> [{team,pts,gd,gf}]
  GROUP_LETTERS.forEach(g=>{
    standings[g] = TEAM_NAMES.filter(t=>TEAMS[t].g===g).map(t=>({team:t,pts:0,gd:0,gf:0}));
  });
  const idxOf = {}; GROUP_LETTERS.forEach(g=>{ standings[g].forEach((r,i)=>idxOf[r.team]=i); });
  for(const f of FIXTURES){
    let ga,gb;
    if(locked[f.id]){ ga=locked[f.id].ga; gb=locked[f.id].gb; }
    else { const r=simMatch(f.home,f.away,elo,false); ga=r.ga; gb=r.gb; }
    const rows = standings[f.g];
    const H=rows[idxOf[f.home]], A=rows[idxOf[f.away]];
    H.gf+=ga; A.gf+=gb; H.gd+=ga-gb; A.gd+=gb-ga;
    if(ga>gb) H.pts+=3; else if(gb>ga) A.pts+=3; else { H.pts++; A.pts++; }
  }
  const winners={}, runners={}, thirds={};
  const thirdPool=[];
  GROUP_LETTERS.forEach(g=>{
    const r=[...standings[g]].sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || (Math.random()-0.5));
    winners[g]=r[0].team; runners[g]=r[1].team; thirds[g]=r[2].team;
    thirdPool.push({g, ...r[2]});
  });
  thirdPool.sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || (Math.random()-0.5));
  const bestThirdGroups = thirdPool.slice(0,8).map(t=>t.g);
  const thirdAssign = assignThirds(bestThirdGroups);

  // ----- resolve R32 -----
  const resolve = (spec, slotIdx)=>{
    if(spec.t==="W") return winners[spec.g];
    if(spec.t==="R") return runners[spec.g];
    return thirds[thirdAssign[slotIdx]]; // T
  };
  const r32 = R32.map((m,i)=>({ a:resolve(m.a,i), b:resolve(m.b,i) }));

  // count qualifiers (reached R32)
  r32.forEach(m=>{ acc[m.a].r32++; acc[m.b].r32++; });
  winners && GROUP_LETTERS.forEach(g=>{ acc[winners[g]].gw++; acc[runners[g]].gr++; });

  // ----- knockout -----
  const koWin = (x,y)=> simMatch(x,y,elo,true).win==="A" ? x : y;
  const r16win = r32.map(m=>koWin(m.a,m.b));     // 16 winners
  r16win.forEach(t=>acc[t].r16++);
  const qfTeams = R16_PAIRS.map(([p,q])=>koWin(r16win[p], r16win[q])); // 8
  qfTeams.forEach(t=>acc[t].qf++);
  const sfTeams = QF_PAIRS.map(([p,q])=>koWin(qfTeams[p], qfTeams[q])); // 4
  sfTeams.forEach(t=>acc[t].sf++);
  const fnTeams = SF_PAIRS.map(([p,q])=>koWin(sfTeams[p], sfTeams[q])); // 2
  fnTeams.forEach(t=>acc[t].fin++);
  const champ = koWin(fnTeams[0], fnTeams[1]);
  acc[champ].champ++;
}

/* ----------------------------- COLOURS -------------------------------- */
function lerp(a,b,t){ return Math.round(a+(b-a)*t); }
function pinkRamp(t){ // 0..1 -> css
  t=Math.max(0,Math.min(1,t));
  const stops=[[253,240,245],[247,176,201],[229,57,110],[148,18,72]];
  const seg=t*3, i=Math.min(2,Math.floor(seg)), f=seg-i;
  const a=stops[i], b=stops[i+1];
  return `rgb(${lerp(a[0],b[0],f)},${lerp(a[1],b[1],f)},${lerp(a[2],b[2],f)})`;
}
const fmt = (p)=> p>=0.995?"100" : p<0.0005?"·" : p<0.01?(p*100).toFixed(1) : (p*100).toFixed(p<0.1?1:0);

  "Türkiye":["Montella","M"], Uruguay:["Bielsa","B"], "United States":["Pochettino","P"], Uzbekistan:["Cannavaro","C"], Tunisia:["Lamouchi","L"],
};
// neutral win-share (P(win)+½P(draw)) from the same Elo→Poisson model, no host bump
function neutralScore(eloA, eloB){
  const sup=(eloA-eloB)/250;
  const la=Math.max(.18,1.38+sup/2), lb=Math.max(.18,1.38-sup/2);
  const pmf=(l,k)=>Math.exp(-l)*Math.pow(l,k)/factorial(k);
  let w=0,d=0;
  for(let i=0;i<=9;i++) for(let j=0;j<=9;j++){ const p=pmf(la,i)*pmf(lb,j); if(i>j)w+=p; else if(i===j)d+=p; }
  return w + 0.5*d;
}
function diverge(t){ // 0..1 ; 0.5 neutral. turquoise(low) -> cream(mid) -> pink(high)
  t=Math.max(0,Math.min(1,t));
  const lo=[17,181,196], mid=[247,237,230], hi=[229,57,110];
  let a,b,f;
  if(t<0.5){ a=lo;b=mid;f=t/0.5; } else { a=mid;b=hi;f=(t-0.5)/0.5; }
  return `rgb(${lerp(a[0],b[0],f)},${lerp(a[1],b[1],f)},${lerp(a[2],b[2],f)})`;
}

const IconBracket=({s=16})=>(<svg width={s} height={s} viewBox="0 0 24 24" {...ico}><path d="M3 5h4M3 9h4M7 5v4M7 7h3"/><path d="M3 15h4M3 19h4M7 15v4M7 17h3"/><path d="M10 7v10M10 12h4"/><path d="M14 12h3"/></svg>);

// expected W/D/L + expected goals from current Elo (analytic, no sim)
function expWDL(elo, a, b){
  const [lamA, lamB] = lambdas(elo[a], elo[b], HOSTS.has(a), HOSTS.has(b), false);
  const pmf=(l,k)=>Math.exp(-l)*Math.pow(l,k)/factorial(k);
  let w=0,d=0,los=0;
  for(let i=0;i<=9;i++) for(let j=0;j<=9;j++){ const p=pmf(lamA,i)*pmf(lamB,j); if(i>j)w+=p; else if(i===j)d+=p; else los+=p; }
  const s=w+d+los; return { w:w/s, d:d/s, l:los/s, lamA, lamB };
}

// deterministic "most likely" projection of the whole tournament
function projectTournament(locked){
  const elo = buildCurrentElo(locked);
  const acc = {}; TEAM_NAMES.forEach(t=>acc[t]={pts:0,gf:0,ga:0});
  const fbg = {}; GROUP_LETTERS.forEach(g=>fbg[g]=[]);
  FIXTURES.forEach(f=>{
    const lk = locked[f.id]; let gh,ga,played=false;
    if(lk){ gh=lk.ga; ga=lk.gb; played=true;
      acc[f.home].gf+=gh; acc[f.home].ga+=ga; acc[f.away].gf+=ga; acc[f.away].ga+=gh;
      if(gh>ga) acc[f.home].pts+=3; else if(ga>gh) acc[f.away].pts+=3; else { acc[f.home].pts++; acc[f.away].pts++; }
    } else {
      const e = expWDL(elo, f.home, f.away); gh=Math.round(e.lamA); ga=Math.round(e.lamB);
      acc[f.home].pts += 3*e.w + e.d; acc[f.away].pts += 3*e.l + e.d;
      acc[f.home].gf += e.lamA; acc[f.home].ga += e.lamB; acc[f.away].gf += e.lamB; acc[f.away].ga += e.lamA;
    }
    fbg[f.g].push({ id:f.id, home:f.home, away:f.away, gh, ga, played });
  });
  const tables={};
  GROUP_LETTERS.forEach(g=>{
    tables[g] = TEAM_NAMES.filter(t=>TEAMS[t].g===g)
      .map(t=>({ team:t, pts:acc[t].pts, gf:acc[t].gf, gd:acc[t].gf-acc[t].ga }))
      .sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || TEAMS[y.team].elo-TEAMS[x.team].elo);
  });
  const winners={}, runners={}, thirds={}, pool=[];
  GROUP_LETTERS.forEach(g=>{ const r=tables[g]; winners[g]=r[0].team; runners[g]=r[1].team; thirds[g]=r[2].team;
    pool.push({ g, pts:r[2].pts, gd:r[2].gd, gf:r[2].gf }); });
  const best8 = pool.sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf).slice(0,8).map(p=>p.g);
  const tassign = assignThirds(best8);
  const resolve = (sp, i)=> sp.t==="W" ? winners[sp.g] : sp.t==="R" ? runners[sp.g] : thirds[tassign[i]];
  const koMatch = (a,b)=>{
    const [lamA,lamB] = lambdas(elo[a], elo[b], HOSTS.has(a), HOSTS.has(b), true);
    const eA = elo[a]+(HOSTS.has(a)?30:0), eB = elo[b]+(HOSTS.has(b)?30:0);
    return { a, b, ga:Math.round(lamA), gb:Math.round(lamB), winner: eA>=eB ? a : b };
  };
  const r32 = R32.map((m,i)=> koMatch(resolve(m.a,i), resolve(m.b,i)));
  const r16 = R16_PAIRS.map(([p,q])=> koMatch(r32[p].winner, r32[q].winner));
  const qf  = QF_PAIRS.map(([p,q])=> koMatch(r16[p].winner, r16[q].winner));
  const sf  = SF_PAIRS.map(([p,q])=> koMatch(qf[p].winner, qf[q].winner));
  const final = koMatch(sf[0].winner, sf[1].winner);
  return { tables, fbg, r32, r16, qf, sf, final, champion:final.winner };
}

// real group standings from played (locked) results only
function realStandings(locked){
  const acc={}; TEAM_NAMES.forEach(t=>acc[t]={P:0,W:0,D:0,L:0,GF:0,GA:0});
  FIXTURES.forEach(f=>{ const lk=locked[f.id]; if(!lk) return;
    const gh=lk.ga, ga=lk.gb;
    acc[f.home].P++; acc[f.away].P++;
    acc[f.home].GF+=gh; acc[f.home].GA+=ga; acc[f.away].GF+=ga; acc[f.away].GA+=gh;
    if(gh>ga){ acc[f.home].W++; acc[f.away].L++; }
    else if(ga>gh){ acc[f.away].W++; acc[f.home].L++; }
    else { acc[f.home].D++; acc[f.away].D++; }
  });
  const tab={};
  GROUP_LETTERS.forEach(g=>{
    tab[g]=TEAM_NAMES.filter(t=>TEAMS[t].g===g).map(t=>{
      const a=acc[t]; return { team:t, ...a, GD:a.GF-a.GA, Pts:a.W*3+a.D };
    }).sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || TEAMS[y.team].elo-TEAMS[x.team].elo);
  });
  return tab;
}

// inline score entry for one fixture (writes to the shared locked state)
function GFix({f, locked, feed, overrides, lockResult, clearResult, pred}){
  const mono="'IBM Plex Mono',monospace";
  const lk=locked[f.id];
  const fromFeed = !!(feed && feed[f.id]);
  const edited   = !!(overrides && overrides[f.id]);
  const [h,setH]=useState(lk?String(lk.ga):"");
  const [a,setA]=useState(lk?String(lk.gb):"");
  useEffect(()=>{ setH(lk?String(lk.ga):""); setA(lk?String(lk.gb):""); },[lk]);
  const sync=(hh,aa)=>{ if(hh!==""&&aa!==""){ lockResult(f.id,+hh,+aa); } else if(lk){ clearResult(f.id); } };
  const onH=v=>{ v=v.replace(/[^0-9]/g,"").slice(0,2); setH(v); sync(v,a); };
  const onA=v=>{ v=v.replace(/[^0-9]/g,"").slice(0,2); setA(v); sync(h,v); };
  const borderColor = edited ? C.pink : (fromFeed ? C.turqDeep : C.line);
  const inp={width:26, height:23, textAlign:"center", border:`1px solid ${borderColor}`,
    borderRadius:6, fontFamily:mono, fontSize:13, background:"#fff", color:C.ink, outline:"none"};
  const dot = edited ? C.pink : (fromFeed ? C.turqDeep : null);
  return (
    <div style={{display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:6, padding:"3px 0"}}>
      <span style={{textAlign:"right", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontSize:11.5}}>
        {f.home} <span style={{fontSize:13}}>{TEAMS[f.home].fl}</span>
      </span>
      <span style={{display:"flex", alignItems:"center", gap:3}}>
        <input value={h} onChange={e=>onH(e.target.value)} placeholder={String(pred?.gh ?? "")} style={inp} inputMode="numeric"/>
        <span style={{color:C.inkSoft, fontSize:11}}>–</span>
        <input value={a} onChange={e=>onA(e.target.value)} placeholder={String(pred?.ga ?? "")} style={inp} inputMode="numeric"/>
        {dot && <span title={edited?"edited (overrides feed)":"from daily feed"} style={{width:6, height:6, borderRadius:6, background:dot, marginLeft:2}}/>}
      </span>
      <span style={{whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontSize:11.5}}>
        <span style={{fontSize:13}}>{TEAMS[f.away].fl}</span> {f.away}
      </span>
    </div>
  );
}

function Bracket({probs, locked, feed, overrides, lockResult, clearResult}){
  const mono="'IBM Plex Mono',monospace";
  const trunc=(s,n)=> s.length>n ? s.slice(0,n-1)+"\u2026" : s;
  const proj = useMemo(()=> projectTournament(locked), [locked]);
  const stand = useMemo(()=> realStandings(locked), [locked]);
  const predById = useMemo(()=>{ const m={}; GROUP_LETTERS.forEach(g=>proj.fbg[g].forEach(x=>{m[x.id]=x;})); return m; }, [proj]);

  // ---- SVG bracket geometry ----
  const CW=150, CH=44, UNIT=56, GAPH=46, PADT=30;
  const rounds=[proj.r32, proj.r16, proj.qf, proj.sf, [proj.final]];
  const pm=[null, R16_PAIRS, QF_PAIRS, SF_PAIRS, [[0,1]]];
  // leaf order so the tree's (non-adjacent) pairings stack without crossing lines
  const LEAF=[10,0,3,9,5,4,1,6,14,13,2,11,7,12,8,15];
  const pos={}; LEAF.forEach((idx,p)=>pos[idx]=p);
  const yc=[]; yc[0]=proj.r32.map((_,j)=> pos[j]*UNIT + CH/2 + PADT);
  for(let r=1;r<5;r++){ yc[r]=rounds[r].map((_,k)=>{ const [i,j]=pm[r][k]; return (yc[r-1][i]+yc[r-1][j])/2; }); }
  const colX=r=> r*(CW+GAPH);
  const Wd=colX(5)+150, Ht=proj.r32.length*UNIT + PADT + 12;
  const labels=["Round of 32","Round of 16","Quarters","Semis","Final"];

  const conns=[];
  for(let r=1;r<5;r++){ rounds[r].forEach((_,k)=>{ const [i,j]=pm[r][k]; const cxR=colX(r-1)+CW, px=colX(r), midX=(cxR+px)/2;
    [i,j].forEach((c,ci)=> conns.push(<path key={`c${r}-${k}-${ci}`} d={`M${cxR} ${yc[r-1][c]} H${midX} V${yc[r][k]} H${px}`} fill="none" stroke={C.line} strokeWidth="1.3"/>));
  }); }
  conns.push(<path key="cw" d={`M${colX(4)+CW} ${yc[4][0]} H${colX(5)}`} fill="none" stroke={C.line} strokeWidth="1.3"/>);

  const cards=[];
  rounds.forEach((round,r)=> round.forEach((tie,k)=>{
    const x=colX(r), top=yc[r][k]-CH/2;
    cards.push(
      <g key={`m${r}-${k}`}>
        <rect x={x} y={top} width={CW} height={CH} rx="7" fill={C.surface} stroke={C.line}/>
        {[[tie.a,tie.ga],[tie.b,tie.gb]].map(([t,gg],ri)=>{
          const win=t===tie.winner, ry=top+ri*(CH/2);
          return (
            <g key={ri}>
              {win && <rect x={x+1.5} y={ry+1.5} width={CW-3} height={CH/2-3} rx="5" fill={C.pinkSoft}/>}
              {ri===1 && <line x1={x+6} y1={top+CH/2} x2={x+CW-6} y2={top+CH/2} stroke={C.bg2} strokeWidth="1"/>}
              <text x={x+9} y={ry+CH/4} dominantBaseline="central" fontSize="12">{TEAMS[t]?.fl}</text>
              <text x={x+27} y={ry+CH/4} dominantBaseline="central" fontSize="11" fontFamily="'IBM Plex Sans',sans-serif" fill={win?C.pinkDeep:C.ink} fontWeight={win?600:400}>{trunc(t,13)}</text>
              <text x={x+CW-9} y={ry+CH/4} dominantBaseline="central" textAnchor="end" fontSize="10.5" fontFamily={mono} fill="#BCB2C4" fontWeight={400} fontStyle="italic">{gg}</text>
            </g>
          );
        })}
      </g>
    );
  }));

  const wx=colX(5)+20, wy=yc[4][0], champ=proj.champion;
  const winnerEl=(
    <g key="winner">
      <g transform={`translate(${wx+38},${wy-66}) scale(1.5)`} fill="none" stroke={C.gold} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4v1.5A3.5 3.5 0 0 0 7.5 10"/><path d="M17 5h3v1.5A3.5 3.5 0 0 1 16.5 10"/><path d="M12 14v3"/><path d="M9.5 21h5l-.7-4h-3.6l-.7 4Z"/>
      </g>
      <text x={wx+62} y={wy-2} textAnchor="middle" fontSize="30">{TEAMS[champ]?.fl}</text>
      <text x={wx+62} y={wy+26} textAnchor="middle" fontSize="17" fontFamily="'Fraunces',serif" fontWeight="600" fill={C.ink}>{champ}</text>
      <text x={wx+62} y={wy+42} textAnchor="middle" fontSize="9" fontFamily={mono} fill={C.inkSoft} letterSpacing="1">PROJECTED WINNER</text>
    </g>
  );
  const labelEls=labels.map((lab,r)=>(
    <text key={`l${r}`} x={colX(r)+CW/2} y={16} textAnchor="middle" fontSize="10" fontFamily={mono} fill={C.inkSoft} letterSpacing="1">{lab.toUpperCase()}</text>
  ));
  labelEls.push(<text key="lw" x={wx+62} y={16} textAnchor="middle" fontSize="10" fontFamily={mono} fill={C.inkSoft} letterSpacing="1">WINNER</text>);

  return (
    <div className="fade">
      <div className="card" style={{padding:"20px 22px", marginBottom:16}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <span style={{color:C.pink}}><IconBracket s={26}/></span>
          <div>
            <div style={{fontFamily:"'Fraunces',serif", fontSize:24, fontWeight:600, lineHeight:1}}>Live bracket &amp; groups</div>
            <div style={{color:C.inkSoft, fontSize:13, marginTop:4}}>Enter results in the group tables below — standings and the projected bracket update instantly.</div>
          </div>
        </div>
      </div>

      {/* knockout bracket (SVG, connected) */}
      <div className="card" style={{padding:"14px 16px", marginBottom:18}}>
        <div style={{overflowX:"auto"}}>
          <svg width={Wd} height={Ht} viewBox={`0 0 ${Wd} ${Ht}`} style={{display:"block"}}>
            {conns}{cards}{winnerEl}{labelEls}
          </svg>
        </div>
        <p style={{fontSize:11.5, color:C.inkSoft, margin:"4px 4px 0", fontStyle:"italic"}}>Projected path — favourite advances; the faint italic scores are <b>predictions</b>, not results. The Title Race tab holds the full Monte Carlo probabilities.</p>
      </div>

      {/* live group tables + entry */}
      <div style={{fontFamily:mono, fontSize:10.5, letterSpacing:1, color:C.inkSoft, textTransform:"uppercase", margin:"4px 2px 12px"}}>Groups A–L · enter results, collect the table</div>
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))", gap:14}}>
        {GROUP_LETTERS.map(g=>(
          <div key={g} className="card" style={{padding:"14px 16px"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8}}>
              <span style={{fontFamily:"'Fraunces',serif", fontSize:18, fontWeight:600}}>Group {g}</span>
              <span style={{fontFamily:mono, fontSize:8.5, color:C.inkSoft, letterSpacing:.5}}>PL · GF:GA · GD · PTS · ADV</span>
            </div>
            {/* header row */}
            <div style={{display:"grid", gridTemplateColumns:"13px 1fr 20px 44px 28px 26px 40px", gap:3, padding:"0 3px 4px", fontFamily:mono, fontSize:8.5, color:C.inkSoft, textTransform:"uppercase"}}>
              <span/><span/><span style={{textAlign:"right"}}>Pl</span><span style={{textAlign:"right"}}>GF:GA</span><span style={{textAlign:"right"}}>GD</span><span style={{textAlign:"right"}}>Pt</span><span style={{textAlign:"right"}}>Adv</span>
            </div>
            {stand[g].map((r,i)=>(
              <div key={r.team} style={{display:"grid", gridTemplateColumns:"13px 1fr 20px 44px 28px 26px 40px", gap:3, alignItems:"center",
                padding:"4px 3px", borderRadius:6,
                background: i<2 ? "rgba(17,181,196,0.10)" : i===2 ? "rgba(232,163,61,0.12)" : "transparent", fontSize:12}}>
                <span style={{color:C.inkSoft, fontFamily:mono, fontSize:10}}>{i+1}</span>
                <span style={{display:"flex", alignItems:"center", gap:6, overflow:"hidden", whiteSpace:"nowrap", fontWeight:i<2?600:400}}>
                  <span style={{fontSize:13}}>{TEAMS[r.team].fl}</span>
                  <span style={{overflow:"hidden", textOverflow:"ellipsis"}}>{trunc(r.team,12)}</span>
                </span>
                <span style={{fontFamily:mono, textAlign:"right", color:C.inkSoft}}>{r.P}</span>
                <span style={{fontFamily:mono, textAlign:"right", color:C.inkSoft}}>{r.GF}:{r.GA}</span>
                <span style={{fontFamily:mono, textAlign:"right", color:C.inkSoft}}>{(r.GD>=0?"+":"")+r.GD}</span>
                <span style={{fontFamily:mono, textAlign:"right", fontWeight:600}}>{r.Pts}</span>
                <span style={{fontFamily:mono, textAlign:"right", color:C.turqDeep}}>{probs?Math.round(probs[r.team].adv*100)+"%":"\u2014"}</span>
              </div>
            ))}
            <div style={{marginTop:10, paddingTop:8, borderTop:`1px solid ${C.bg2}`}}>
              <div style={{fontFamily:mono, fontSize:8.5, color:C.inkSoft, letterSpacing:.5, marginBottom:4, textTransform:"uppercase"}}>Results · type a score</div>
              {FIXTURES.filter(f=>f.g===g).map(f=>(
                <GFix key={f.id} f={f} locked={locked} feed={feed} overrides={overrides} lockResult={lockResult} clearResult={clearResult} pred={predById[f.id]}/>
              ))}
            </div>
          </div>
        ))}
      </div>
      <p style={{fontSize:11.5, color:C.inkSoft, marginTop:14, fontStyle:"italic"}}>
        Standings count only played games; faint numbers in the score boxes are the model’s prediction until you enter the real result. Top two (turquoise) and best thirds advance; ADV% is each team’s Monte-Carlo chance of reaching the knockouts.
      </p>
    </div>
  );
}

/* ============================== APP =================================== */
function App(){
  // server-fed results from data/results.csv (read-only)
  const [feed, setFeed] = useState({});
  // user overrides — saved to localStorage
  const [overrides, setOverrides] = useState({});
  // effective scores used by the simulator: overrides win
  const locked = useMemo(()=> ({ ...feed, ...overrides }), [feed, overrides]);
  const [probs, setProbs] = useState(null);
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [tab, setTab] = useState("race");
  const [sel, setSel] = useState("Spain");
  const [official, setOfficial] = useState(null);
  const SIMS = 4000;

  // pull the server's daily forecast (published by the GitHub Action), if present
  useEffect(()=>{
    fetch("data/forecast.json", {cache:"no-store"})
      .then(r=> r.ok ? r.json() : null)
      .then(d=> { if(d && Array.isArray(d.teams)) setOfficial(d); })
      .catch(()=>{});
  }, []);

  // pull the server's played results (same workflow), seed the feed layer
  useEffect(()=>{
    fetch("data/results.csv", {cache:"no-store"})
      .then(r => r.ok ? r.text() : "")
      .then(t => setFeed(feedFromCSV(t)))
      .catch(()=>{});
  }, []);

  // load user overrides; migrate the pre-feed `wc26_results` key once
  useEffect(()=>{
    try {
      const cur = localStorage.getItem("wc26_overrides");
      if (cur) { setOverrides(JSON.parse(cur)); return; }
      const old = localStorage.getItem("wc26_results");
      if (old) { setOverrides(JSON.parse(old)); localStorage.setItem("wc26_overrides", old); }
    } catch(e){}
  }, []);

  const persist = useCallback((next)=>{ try { localStorage.setItem("wc26_overrides", JSON.stringify(next)); } catch(e){} },[]);

  // chunked monte-carlo
  const run = useCallback(()=>{
    setRunning(true); setProgress(0);
    const elo = buildCurrentElo(locked);
    const acc = {}; TEAM_NAMES.forEach(t=>acc[t]={champ:0,fin:0,sf:0,qf:0,r16:0,r32:0,gw:0,gr:0});
    let done=0; const CHUNK=200;
    const step=()=>{
      const end=Math.min(SIMS, done+CHUNK);
      for(;done<end;done++) simTournament(elo, locked, acc);
      setProgress(done/SIMS);
      if(done<SIMS){ setTimeout(step,0); }
      else {
        const out={};
        TEAM_NAMES.forEach(t=>{
          const a=acc[t];
          out[t]={
            champ:a.champ/SIMS, fin:a.fin/SIMS, sf:a.sf/SIMS, qf:a.qf/SIMS,
            r16:a.r16/SIMS, r32:a.r32/SIMS, gw:a.gw/SIMS, gr:a.gr/SIMS,
            adv:a.r32/SIMS, elo:elo[t],
          };
        });
        setProbs(out); setRunning(false);
      }
    };
    setTimeout(step,0);
  },[locked]);

  useEffect(()=>{ run(); /* re-run when results change */ }, [run]);

  const ranked = useMemo(()=> probs ? [...TEAM_NAMES].sort((a,b)=> probs[b].champ-probs[a].champ || probs[b].fin-probs[a].fin) : [], [probs]);
  const leader = ranked[0];

  // editing rules:
  //   lockResult: if the new score equals the server feed, drop the override (back to "feed" state)
  //   clearResult: drop the override only — the feed value (if any) re-appears underneath
  //   clearAll: drop all overrides; feed stays
  const lockResult = (id, ga, gb) => {
    const f = feed[id];
    let next;
    if (f && f.ga === ga && f.gb === gb) { next = {...overrides}; delete next[id]; }
    else                                  { next = {...overrides, [id]: {ga, gb}}; }
    setOverrides(next); persist(next);
  };
  const clearResult = (id) => { const next = {...overrides}; delete next[id]; setOverrides(next); persist(next); };
  const clearAll    = () => { setOverrides({}); persist({}); };

  return (
    <div style={{minHeight:"100vh", background:C.bg, color:C.ink, fontFamily:"'IBM Plex Sans',sans-serif"}}>
      <style>{styles}</style>

      {/* ---- masthead ---- */}
      <div style={{maxWidth:1180, margin:"0 auto", padding:"28px 22px 0"}}>
        <div style={{display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:14}}>
          <div>
            <div style={{display:"flex", alignItems:"center", gap:10, color:C.turqDeep, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:2, textTransform:"uppercase"}}>
              <span style={{width:26, height:3, background:C.turq, borderRadius:2}}/>
              Elo · Poisson · Monte Carlo · {SIMS.toLocaleString()} sims
            </div>
            <h1 style={{fontFamily:"'Fraunces',serif", fontWeight:600, fontSize:"clamp(34px,5vw,58px)", lineHeight:0.96, margin:"8px 0 2px", letterSpacing:-0.5}}>
              Mundial <span style={{color:C.pink}}>’26</span> <span style={{color:C.inkSoft, fontStyle:"italic", fontWeight:400}}>forecast lab</span>
            </h1>
            <p style={{color:C.inkSoft, fontSize:13.5, maxWidth:560, margin:"6px 0 0"}}>
              48 teams · USA · Canada · México · 11 Jun – 19 Jul. Lock real results in <b style={{color:C.pink}}>Match Center</b> and the whole forecast re-simulates.
            </p>
          </div>
          <button className="btn-primary" onClick={run} disabled={running}>
            {running ? "Simulating…" : "↻ Re-run forecast"}
          </button>
        </div>

        {/* progress */}
        <div style={{height:4, background:C.bg2, borderRadius:4, marginTop:18, overflow:"hidden"}}>
          <div style={{height:"100%", width:`${progress*100}%`, background:`linear-gradient(90deg,${C.turq},${C.pink})`, transition:"width .1s"}}/>
        </div>

        {/* official daily run (from GitHub Actions), if published */}
        {official && (
          <div style={{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap",
            marginTop:16, padding:"10px 14px", borderRadius:10,
            background:C.turqSoft, border:`1px solid ${C.turq}33`}}>
            <span style={{display:"flex", alignItems:"center", gap:7, color:C.turqDeep, fontWeight:600, fontSize:12.5}}>
              <IconCal s={15}/> Daily run
            </span>
            <span style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.inkSoft}}>
              updated {String(official.updated).slice(0,10)} · {official.results_used} result{official.results_used===1?"":"s"} in · {official.n_sims.toLocaleString()} sims
            </span>
            <span style={{flex:1}}/>
            <span style={{display:"flex", gap:12, fontFamily:"'IBM Plex Mono',monospace", fontSize:12}}>
              {official.teams.slice(0,3).map((t,i)=>(
                <span key={t.team} style={{color:i===0?C.pinkDeep:C.ink}}>
                  {TEAMS[t.team]?.fl} {t.team} <b>{(t.champion*100).toFixed(1)}%</b>
                </span>
              ))}
            </span>
          </div>
        )}

        {/* tabs */}
        <div style={{display:"flex", gap:6, marginTop:18, borderBottom:`1px solid ${C.line}`, flexWrap:"wrap"}}>
          {[["race",IconTrophy,"Title Race"],["bracket",IconBracket,"Bracket"],["team",IconFlask,"Team Lab"],["match",IconCal,"Match Center"],["oracle",IconOctopus,"Oracle"]].map(([k,Icon,l])=>(
            <button key={k} onClick={()=>setTab(k)} className="tab" style={{
              display:"flex", alignItems:"center", gap:7,
              color: tab===k?C.ink:C.inkSoft,
              borderBottom: tab===k?`2.5px solid ${C.pink}`:"2.5px solid transparent",
              fontWeight: tab===k?600:500,
            }}><span style={{color: tab===k?C.pink:C.inkSoft, display:"flex"}}><Icon s={16}/></span>{l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1180, margin:"0 auto", padding:"22px 22px 70px"}}>
        {!probs && <div style={{color:C.inkSoft, padding:40, textAlign:"center"}}>Warming up the simulator…</div>}
        {probs && tab==="race" && <TitleRace probs={probs} ranked={ranked} leader={leader} onPick={(t)=>{setSel(t);setTab("team");}}/>}
        {probs && tab==="bracket" && <Bracket probs={probs} locked={locked} feed={feed} overrides={overrides} lockResult={lockResult} clearResult={clearResult}/>}
        {probs && tab==="team" && <TeamLab probs={probs} sel={sel} setSel={setSel}/>}
        {probs && tab==="match" && <MatchCenter locked={locked} feed={feed} overrides={overrides} lockResult={lockResult} clearResult={clearResult} clearAll={clearAll}/>}
        {tab==="oracle" && <Oracle/>}
      </div>
    </div>
  );
}

/* --------------------------- TITLE RACE ------------------------------- */
function TitleRace({probs, ranked, leader, onPick}){
  const top = ranked.slice(0,3);
  const maxChamp = probs[leader].champ || 1;
  return (
    <div className="fade">
      {/* podium */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:14, marginBottom:22}}>
        {top.map((t,i)=>(
          <div key={t} className="card" style={{padding:"18px 20px", position:"relative", overflow:"hidden",
            border: i===0?`1.5px solid ${C.pink}`:`1px solid ${C.line}`}}>
            {i===0 && <div style={{position:"absolute", inset:0, background:`radial-gradient(120% 90% at 100% 0%, ${C.pinkSoft} 0%, transparent 55%)`}}/>}
            <div style={{position:"relative"}}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.inkSoft, letterSpacing:1}}>
                {["FAVOURITE","2ND FAVOURITE","3RD FAVOURITE"][i]}
              </div>
              <div style={{display:"flex", alignItems:"center", gap:10, margin:"6px 0 2px"}}>
                <span style={{fontSize:30}}>{TEAMS[t].fl}</span>
                <span style={{fontFamily:"'Fraunces',serif", fontSize:24, fontWeight:600}}>{t}</span>
              </div>
              <div style={{display:"flex", alignItems:"baseline", gap:6}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:38, fontWeight:600, color:C.pink, lineHeight:1}}>{fmt(probs[t].champ)}</span>
                <span style={{color:C.inkSoft, fontSize:13}}>% to lift the trophy</span>
              </div>
              <div style={{fontSize:12, color:C.inkSoft, marginTop:6, fontFamily:"'IBM Plex Mono',monospace"}}>
                final {fmt(probs[t].fin)}% · final-4 {fmt(probs[t].sf)}% · Elo {Math.round(probs[t].elo)}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* leaderboard */}
      <div className="card" style={{padding:0, overflow:"hidden"}}>
        <div style={{display:"grid", gridTemplateColumns:"34px 1fr 56px 84px 70px 70px 70px", padding:"11px 16px",
          fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:1, color:C.inkSoft, borderBottom:`1px solid ${C.line}`, textTransform:"uppercase"}}>
          <span>#</span><span>Team</span><span>Grp</span><span style={{textAlign:"right"}}>Champ</span>
          <span style={{textAlign:"right"}}>Final</span><span style={{textAlign:"right"}}>Last 4</span><span style={{textAlign:"right"}}>Win grp</span>
        </div>
        <div style={{maxHeight:560, overflowY:"auto"}}>
          {ranked.map((t,i)=>{
            const p=probs[t];
            return (
              <div key={t} className="lb-row" onClick={()=>onPick(t)}
                style={{display:"grid", gridTemplateColumns:"34px 1fr 56px 84px 70px 70px 70px", alignItems:"center",
                  padding:"9px 16px", borderBottom:`1px solid ${C.bg2}`, cursor:"pointer",
                  fontFamily:"'IBM Plex Mono',monospace", fontSize:13}}>
                <span style={{color:C.inkSoft}}>{i+1}</span>
                <span style={{fontFamily:"'IBM Plex Sans',sans-serif", display:"flex", alignItems:"center", gap:9, fontWeight:500}}>
                  <span style={{fontSize:18}}>{TEAMS[t].fl}</span>{t}
                </span>
                <span style={{color:C.inkSoft}}>{TEAMS[t].g}</span>
                <span style={{textAlign:"right"}}>
                  <span className="chip" style={{background:pinkRamp(p.champ/maxChamp), color:p.champ/maxChamp>0.45?"#fff":C.ink}}>{fmt(p.champ)}</span>
                </span>
                <span style={{textAlign:"right", color:C.ink}}>{fmt(p.fin)}</span>
                <span style={{textAlign:"right", color:C.inkSoft}}>{fmt(p.sf)}</span>
                <span style={{textAlign:"right", color:C.inkSoft}}>{fmt(p.gw)}</span>
              </div>
            );
          })}
        </div>
      </div>
      <p style={{fontSize:11.5, color:C.inkSoft, marginTop:12, fontStyle:"italic"}}>
        Tap any team for its full path. Cells shaded on a pink intensity ramp (deeper = more likely).
      </p>
    </div>
  );
}

/* ---------------------------- TEAM LAB -------------------------------- */
const STAGES = [
  ["Group","start"],["R32","r32"],["R16","r16"],["QF","qf"],["SF","sf"],["Final","fin"],["Title","champ"]
];
function TeamLab({probs, sel, setSel}){
  const p = probs[sel];
  const g = TEAMS[sel].g;
  const groupFix = FIXTURES.filter(f=>f.g===g);
  // build chronological "fixtures for this team" (group)
  const myFix = groupFix.filter(f=>f.home===sel||f.away===sel).map(f=>{
    const opp = f.home===sel?f.away:f.home;
    const r = wdl(sel, opp);
    const [lf,la] = lambdas(TEAMS[sel].elo, TEAMS[opp].elo, HOSTS.has(sel), HOSTS.has(opp), false);
    return { opp, date:f.date, pred:`${Math.round(lf)}–${Math.round(la)}`, ...r };
  });
  const path = STAGES.map(([label,key])=> key==="start" ? 1 : p[key]);

  return (
    <div className="fade">
      {/* selector */}
      <div style={{display:"flex", flexWrap:"wrap", gap:6, marginBottom:18}}>
        {[...TEAM_NAMES].sort((a,b)=>probs[b].champ-probs[a].champ).map(t=>(
          <button key={t} onClick={()=>setSel(t)} className="flagchip" style={{
            background: t===sel?C.pink:C.surface, color:t===sel?"#fff":C.ink,
            border:`1px solid ${t===sel?C.pink:C.line}`}}>
            <span style={{fontSize:15}}>{TEAMS[t].fl}</span>{t}
          </button>
        ))}
      </div>

      <div style={{display:"grid", gridTemplateColumns:"minmax(280px,1fr) minmax(320px,1.4fr)", gap:16, alignItems:"start"}}>
        {/* left: headline + fixtures */}
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <span style={{fontSize:42}}>{TEAMS[sel].fl}</span>
            <div>
              <div style={{fontFamily:"'Fraunces',serif", fontSize:26, fontWeight:600, lineHeight:1}}>{sel}</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color:C.inkSoft, marginTop:3}}>Group {g} · Elo {Math.round(p.elo)}</div>
            </div>
          </div>

          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:18}}>
            <Stat label="Champion" val={fmt(p.champ)} big accent={C.pink}/>
            <Stat label="Reach final" val={fmt(p.fin)} accent={C.turqDeep}/>
            <Stat label="Win group" val={fmt(p.gw)} accent={C.turqDeep}/>
            <Stat label="Advance (R32)" val={fmt(p.adv)} accent={C.turqDeep}/>
          </div>

          <div style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:1, color:C.inkSoft, margin:"22px 0 10px", textTransform:"uppercase"}}>Group fixtures</div>
          {myFix.map((m,i)=>(
            <div key={i} style={{marginBottom:13}}>
              <div style={{display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:5}}>
                <span style={{fontWeight:500}}><span style={{fontSize:15, marginRight:6}}>{TEAMS[m.opp].fl}</span>vs {m.opp}</span>
                <span style={{color:C.inkSoft, fontFamily:"'IBM Plex Mono',monospace", fontSize:11.5}}>{m.date} · <span style={{color:C.pink, fontWeight:600}}>{m.pred}</span></span>
              </div>
              <div style={{display:"flex", height:18, borderRadius:5, overflow:"hidden", fontFamily:"'IBM Plex Mono',monospace", fontSize:10}}>
                <Bar w={m.w} bg={C.pink} fg="#fff" t={`W ${Math.round(m.w*100)}`}/>
                <Bar w={m.d} bg={C.bg2} fg={C.inkSoft} t={`D ${Math.round(m.d*100)}`}/>
                <Bar w={m.l} bg={C.turqSoft} fg={C.turqDeep} t={`L ${Math.round(m.l*100)}`}/>
              </div>
            </div>
          ))}
        </div>

        {/* right: path heatmap */}
        <div className="card" style={{padding:"20px 22px"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:1, color:C.inkSoft, marginBottom:4, textTransform:"uppercase"}}>Projected path · survival heatmap</div>
          <div style={{fontSize:13, color:C.inkSoft, marginBottom:16}}>Probability of <b style={{color:C.ink}}>still being alive</b> at each stage.</div>

          {/* heat strip */}
          <div style={{display:"flex", gap:6, marginBottom:8}}>
            {STAGES.map(([label],i)=>{
              const v=path[i];
              return (
                <div key={label} style={{flex:1, textAlign:"center"}}>
                  <div style={{height:64, borderRadius:8, background:pinkRamp(v),
                    display:"flex", alignItems:"center", justifyContent:"center",
                    color: v>0.45?"#fff":C.ink, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600, fontSize:13.5,
                    border:`1px solid ${C.line}`}}>
                    {fmt(v)}
                  </div>
                  <div style={{fontSize:11, color:C.inkSoft, marginTop:6, fontWeight:500}}>{label}</div>
                </div>
              );
            })}
          </div>

          {/* drop between stages */}
          <div style={{marginTop:18, fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:1, color:C.inkSoft, textTransform:"uppercase"}}>Round-by-round odds</div>
          <div style={{marginTop:8}}>
            {STAGES.slice(1).map(([label],i)=>{
              const prev=path[i], cur=path[i+1];
              const cond = prev>0 ? cur/prev : 0;
              return (
                <div key={label} style={{display:"flex", alignItems:"center", gap:10, marginBottom:7}}>
                  <span style={{width:54, fontSize:12, color:C.inkSoft, textAlign:"right"}}>{label}</span>
                  <div style={{flex:1, height:12, background:C.bg2, borderRadius:6, overflow:"hidden"}}>
                    <div style={{height:"100%", width:`${cur*100}%`, background:pinkRamp(Math.min(1,cur*1.4)), borderRadius:6}}/>
                  </div>
                  <span style={{width:96, fontSize:11, color:C.inkSoft, fontFamily:"'IBM Plex Mono',monospace"}}>
                    {fmt(cur)}% · win {Math.round(cond*100)}%
                  </span>
                </div>
              );
            })}
          </div>
          <p style={{fontSize:11.5, color:C.inkSoft, marginTop:16, fontStyle:"italic"}}>
            “win %” = chance of winning that round <i>given</i> they reached it (the conditional step). The knockout tree is a modelled bracket honouring FIFA’s top-seed separation.
          </p>
        </div>
      </div>
    </div>
  );
}
function Stat({label,val,big,accent}){
  return (
    <div style={{background:C.bg, borderRadius:10, padding:"12px 14px", border:`1px solid ${C.line}`}}>
      <div style={{fontSize:11, color:C.inkSoft, marginBottom:3}}>{label}</div>
      <div style={{fontFamily:"'IBM Plex Mono',monospace", fontWeight:600, fontSize:big?30:22, color:accent||C.ink, lineHeight:1}}>
        {val}<span style={{fontSize:13, color:C.inkSoft}}>%</span>
      </div>
    </div>
  );
}
function Bar({w,bg,fg,t}){
  if(w<0.001) return null;
  return <div style={{width:`${w*100}%`, background:bg, color:fg, display:"flex", alignItems:"center", justifyContent:"center", minWidth:0, overflow:"hidden", whiteSpace:"nowrap"}}>{w>0.12?t:""}</div>;
}

/* -------------------------- MATCH CENTER ------------------------------ */
function MatchCenter({locked, feed, overrides, lockResult, clearResult, clearAll}){
  const byDate = DATE_ORDER.map(d=>({ date:d, games:FIXTURES.filter(f=>f.date===d) }));
  const playedCount = Object.keys(locked).length;
  const feedCount = Object.keys(feed).length;
  const editedCount = Object.keys(overrides).length;
  return (
    <div className="fade">
      <div className="card" style={{padding:"14px 18px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10}}>
        <div style={{fontSize:13, color:C.inkSoft}}>
          <b style={{color:C.ink}}>{playedCount}</b> / 72 group results locked
          {feedCount>0 && <> · <b style={{color:C.turqDeep}}>{feedCount}</b> from the daily feed</>}
          {editedCount>0 && <> · <b style={{color:C.pink}}>{editedCount}</b> edited</>}.
          {" "}Enter a score and the forecast updates; edits override the feed.
        </div>
        {editedCount>0 && <button className="btn-ghost" onClick={clearAll}>Revert edits</button>}
      </div>

      {byDate.map(({date,games})=>(
        <div key={date} style={{marginBottom:20}}>
          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
            <span style={{fontFamily:"'Fraunces',serif", fontSize:18, fontWeight:600}}>{date}</span>
            <span style={{flex:1, height:1, background:C.line}}/>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:10}}>
            {games.map(f=><MatchCard key={f.id} f={f} locked={locked[f.id]} fromFeed={!!feed[f.id]} edited={!!overrides[f.id]} onLock={lockResult} onClear={clearResult}/>)}
          </div>
        </div>
      ))}
    </div>
  );
}
function MatchCard({f, locked, fromFeed, edited, onLock, onClear}){
  const [ga,setGa]=useState(locked?String(locked.ga):"");
  const [gb,setGb]=useState(locked?String(locked.gb):"");
  useEffect(()=>{ setGa(locked?String(locked.ga):""); setGb(locked?String(locked.gb):""); },[locked]);
  const valid = ga!==""&&gb!==""&&!isNaN(+ga)&&!isNaN(+gb);
  // border colour reflects state: pink if edited, turquoise if straight from feed, neutral otherwise
  const accent = edited ? C.pink : (fromFeed ? C.turqDeep : null);
  return (
    <div className="card" style={{padding:"12px 14px", border:accent?`1.5px solid ${accent}`:`1px solid ${C.line}`, background:edited?C.pinkSoft:(fromFeed?C.turqSoft:C.surface)}}>
      <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:C.inkSoft, marginBottom:8}}>
        <span>GROUP {f.g}</span>
        {edited
          ? <span style={{color:C.pink}}>● EDITED</span>
          : (fromFeed ? <span style={{color:C.turqDeep}}>● FEED</span> : null)}
      </div>
      <div style={{display:"flex", alignItems:"center", gap:8}}>
        <Side name={f.home}/>
        <input className="score" value={ga} onChange={e=>setGa(e.target.value.replace(/[^0-9]/g,"").slice(0,1))}/>
        <span style={{color:C.inkSoft}}>–</span>
        <input className="score" value={gb} onChange={e=>setGb(e.target.value.replace(/[^0-9]/g,"").slice(0,1))}/>
        <Side name={f.away} right/>
      </div>
      <div style={{display:"flex", gap:6, marginTop:10}}>
        <button className="btn-mini" disabled={!valid} style={{background:valid?C.pink:C.bg2, color:valid?"#fff":C.inkSoft}}
          onClick={()=>onLock(f.id, +ga, +gb)}>{locked?"Update":"Lock"}</button>
        {edited  && <button className="btn-mini" style={{background:C.surface, color:C.inkSoft, border:`1px solid ${C.line}`}} onClick={()=>onClear(f.id)}>{fromFeed?"Revert":"Clear"}</button>}
      </div>
    </div>
  );
}
function Side({name, right}){
  return (
    <div style={{flex:1, display:"flex", alignItems:"center", gap:7, justifyContent:right?"flex-end":"flex-start", minWidth:0}}>
      {!right && <span style={{fontSize:18}}>{TEAMS[name].fl}</span>}
      <span style={{fontSize:12.5, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{name}</span>
      {right && <span style={{fontSize:18}}>{TEAMS[name].fl}</span>}
    </div>
  );
}

/* ----------------------------- STYLES --------------------------------- */
const styles = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;}
.card{background:${C.surface};border:1px solid ${C.line};border-radius:14px;box-shadow:0 1px 2px rgba(42,36,56,.03),0 8px 24px -18px rgba(42,36,56,.25);}
.btn-primary{background:${C.pink};color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;box-shadow:0 6px 16px -8px ${C.pink};}
.btn-primary:hover:not(:disabled){background:${C.pinkDeep};}
.btn-primary:disabled{opacity:.55;cursor:default;}
.btn-ghost{background:transparent;border:1px solid ${C.line};color:${C.inkSoft};border-radius:8px;padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.btn-ghost:hover{border-color:${C.pink};color:${C.pink};}
.tab{background:none;border:none;padding:10px 14px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;cursor:pointer;transition:.15s;}
.lb-row:hover{background:${C.pinkSoft};}
.chip{display:inline-block;min-width:42px;padding:3px 8px;border-radius:7px;font-weight:600;text-align:center;}
.flagchip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:.12s;font-family:'IBM Plex Sans',sans-serif;}
.flagchip:hover{border-color:${C.pink}!important;}
.score{width:38px;height:34px;text-align:center;border:1px solid ${C.line};border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:${C.ink};background:#fff;}
.score:focus{outline:none;border-color:${C.pink};box-shadow:0 0 0 3px ${C.pinkSoft};}
.btn-mini{flex:1;border:none;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:.12s;}
.btn-mini:disabled{cursor:default;}
.fade{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:${C.line};border-radius:6px;}
@media(max-width:760px){
  div[style*="minmax(280px,1fr) minmax(320px,1.4fr)"]{grid-template-columns:1fr!important;}
  div[style*="34px 1fr 56px 84px 70px 70px 70px"]{grid-template-columns:26px 1fr 70px!important;}
  div[style*="34px 1fr 56px 84px 70px 70px 70px"] > span:nth-child(3),
  div[style*="34px 1fr 56px 84px 70px 70px 70px"] > span:nth-child(5),
  div[style*="34px 1fr 56px 84px 70px 70px 70px"] > span:nth-child(6),
  div[style*="34px 1fr 56px 84px 70px 70px 70px"] > span:nth-child(7){display:none!important;}
}
`;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
